<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KRONOS &middot; Disruption Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 32px 20px;
    box-sizing: border-box;
    background:
      radial-gradient(1100px 600px at 15% 10%, #F1F4FA 0%, transparent 60%),
      radial-gradient(900px 500px at 85% 90%, #E7ECF6 0%, transparent 55%),
      #EEF1F7;
  }
  #root { display: grid; place-items: center; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Dashboard.jsx"></script>

<script type="text/babel">
  function Frame() {
    const W = 390, H = 844;
    return (
      <div style={{
        width: W, height: H, borderRadius: 54,
        background: '#000',
        padding: 12,
        boxShadow:
          '0 50px 110px -30px rgba(10,31,68,0.38),' +
          '0 18px 40px -12px rgba(10,31,68,0.18),' +
          '0 0 0 2px rgba(0,0,0,0.82),' +
          'inset 0 0 0 2px #1a1a1a',
        position: 'relative',
      }}>
        <div style={{
          width: '100%', height: '100%', borderRadius: 44,
          overflow: 'hidden', position: 'relative', background: '#F6F7FB',
        }}>
          {/* dynamic island */}
          <div style={{
            position: 'absolute', top: 10, left: '50%',
            transform: 'translateX(-50%)',
            width: 120, height: 34, borderRadius: 22, background: '#000',
            zIndex: 100,
          }}/>
          <DisruptionDashboard />
          {/* home indicator */}
          <div style={{
            position: 'absolute', bottom: 8, left: 0, right: 0,
            display: 'flex', justifyContent: 'center', zIndex: 101,
            pointerEvents: 'none',
          }}>
            <div style={{
              width: 134, height: 5, borderRadius: 99,
              background: 'rgba(10,31,68,0.55)',
            }}/>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Frame />);
</script>
</body>
</html>
